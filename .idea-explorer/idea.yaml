idea:
  title: Evolved desire in LLMs
  domain: artificial_intelligence
  hypothesis: 'Prompts evolved under selection pressure for goal-persistence in LLMs
    will result in less drift from the original task compared to standard prompts,
    suggesting that persistent "desire" cannot be simply instructed but must be evolved.

    '
  background:
    description: "LLMs can perform goal-pursuit, but they drift when context pulls\
      \ them elsewhere. They don't come back. My intuition is that you can't instruct\
      \ desire into existence\u2014you have to evolve it. So: take a simple task (say,\
      \ outputting incrementing numbers while handling distractions), evolve prompts\
      \ under selection pressure for goal-persistence, and see what survives. Do the\
      \ winners look like anything a human would write? Do they drift less? If so,\
      \ show me what's in them. If not, why not?"

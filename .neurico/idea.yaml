idea:
  title: Evolved desire in LLMs
  domain: artificial_intelligence
  hypothesis: 'Prompts for LLMs that are evolved under selection pressure for goal-persistence
    will result in less drift and greater ability to return to a goal after distraction,
    compared to prompts written by humans or generated without such selection.

    '
  background:
    description: 'LLMs can perform goal-pursuit, but they drift when context pulls
      them elsewhere and do not return to the original goal. The intuition is that
      desire cannot be simply instructed into existence; it must be evolved. The idea
      is to take a simple task (such as outputting incrementing numbers while handling
      distractions), evolve prompts under selection pressure for goal-persistence,
      and observe which prompts survive. The research questions include whether the
      surviving prompts resemble human-written prompts, whether they drift less, and
      what features they contain if they are successful.

      '
